<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Tambah Jaya Market</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #e9edde; /* Warna hijau pastel sesuai gambar */
            color: #333;
            line-height: 1.6;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: #D9E1CC;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #2d4739; /* Hijau tua */
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: #444;
            font-weight: 500;
        }

        /* Main Content */
        .container {
            padding: 60px 15%;
        }

        h1 {
            font-size: 25px;
            color: #2d4739;
            margin-bottom: 25px;
        }

        .contact-info {
            margin-bottom: 40px;
        }

        .info-item {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .icon {
            font-size: 20px;
            margin-right: 15px;
            margin-top: 5px;
        }

        .info-text h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #2d4739;
        }

        /* Form Style */
        .contact-form {
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #c5ccb5;
            border-radius: 5px;
            background-color: #f4f7ed;
            outline: none;
        }

        button {
            background-color: #2d4739;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #3d5e4c;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Tambah Jaya Market</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="profil.html">Tentang Kami</a></li>
            <li><a href="porto.html">Porto</a></li>
            <li><a href="kontak.html"><b>Kontak</b></a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Hubungi Kami</h1>

        <div class="contact-info">
            <div class="info-item">
                <div class="icon">📞</div>
                <div class="info-text">
                    <h3>Telepon / WhatsApp</h3>
                    <p>+62 812-3456-7890</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon">📧</div>
                <div class="info-text">
                    <h3>Email</h3>
                    <p>info@tambahjayamarket.com</p>
                </div>
            </div>

            <div class="info-item">
                <div class="icon">🏠</div>
                <div class="info-text">
                    <h3>Lokasi</h3>
                    <p>Jl. Rungkut Madya No.141, Surabaya</p>
                </div>
            </div>
        </div>

        <hr style="border: 0.5px solid #c5ccb5; margin-bottom: 40px;">


</body>
</html>
